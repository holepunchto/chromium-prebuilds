name: Prebuild
on:
  workflow_dispatch:
jobs:
  linux:
    if: false
    runs-on: beefcake-linux-x64
    name: linux
    steps:
      - name: Install
        run: |
          if [ ! -d "depot_tools" ]; then
            git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
          fi

          echo "$GITHUB_WORKSPACE/depot_tools" >> $GITHUB_PATH

          mkdir -p chromium

      - name: Download
        working-directory: chromium
        run: |
          cat <<EOF > .gclient
          solutions = [
            { "name": "src/prebuilds",
              "url": "https://github.com/${{ github.repository }}.git",
              "deps_file": "DEPS",
              "managed": False,
              "custom_deps": {},
              "custom_vars": {
                "checkout_pgo_profiles": True
              },
            },
          ]
          target_os = ["linux", "android"]
          target_cpu = ["x64", "x86", "arm64", "arm"]
          EOF

          gclient sync -D --revision src/prebuilds@${{ github.ref }}

          ./src/build/linux/sysroot_scripts/install-sysroot.py --arch=arm64
          ./src/build/linux/sysroot_scripts/install-sysroot.py --arch=x64

          if [ ! -d "buildtools" ]; then
            ln -s src/buildtools buildtools
          fi

      - name: Patch
        working-directory: chromium
        run: |
          git apply --directory src src/prebuilds/patches/*.patch

      - name: Build linux-arm64
        working-directory: chromium/src
        run: |
          gn gen out/linux-arm64/v8 --args="import(\"//prebuilds/v8.gni\") import(\"//prebuilds/mode/release.gni\") import(\"//prebuilds/target/linux-arm64.gni\")"
          ninja -C out/linux-arm64/v8 prebuilds

      - name: Build linux-x64
        working-directory: chromium/src
        run: |
          gn gen out/linux-x64/v8 --args="import(\"//prebuilds/v8.gni\") import(\"//prebuilds/mode/release.gni\") import(\"//prebuilds/target/linux-x64.gni\")"
          ninja -C out/linux-x64/v8 prebuilds

      - name: Build android-arm
        working-directory: chromium/src
        run: |
          gn gen out/android-arm/v8 --args="import(\"//prebuilds/v8.gni\") import(\"//prebuilds/mode/release.gni\") import(\"//prebuilds/target/android-arm.gni\")"
          ninja -C out/android-arm/v8 prebuilds

      - name: Build android-arm64
        working-directory: chromium/src
        run: |
          gn gen out/android-arm64/v8 --args="import(\"//prebuilds/v8.gni\") import(\"//prebuilds/mode/release.gni\") import(\"//prebuilds/target/android-arm64.gni\")"
          ninja -C out/android-arm64/v8 prebuilds

      - name: Build android-ia32
        working-directory: chromium/src
        run: |
          gn gen out/android-ia32/v8 --args="import(\"//prebuilds/v8.gni\") import(\"//prebuilds/mode/release.gni\") import(\"//prebuilds/target/android-ia32.gni\")"
          ninja -C out/android-ia32/v8 prebuilds

      - name: Build android-x64
        working-directory: chromium/src
        run: |
          gn gen out/android-x64/v8 --args="import(\"//prebuilds/v8.gni\") import(\"//prebuilds/mode/release.gni\") import(\"//prebuilds/target/android-x64.gni\")"
          ninja -C out/android-x64/v8 prebuilds

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: chromium/src/out/*/v8/obj/prebuilds/*.a
          retention-days: 5

      - name: Clean
        if: always()
        working-directory: chromium/src
        run: |
          git checkout .

  apple:
    if: false
    runs-on: beefcake-macos-arm64
    name: apple
    steps:
      - name: Install
        run: |
          if [ ! -d "depot_tools" ]; then
            git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
          fi

          echo "$GITHUB_WORKSPACE/depot_tools" >> $GITHUB_PATH

          mkdir -p chromium

      - name: Download
        working-directory: chromium
        run: |
          cat <<EOF > .gclient
          solutions = [
            { "name": "src/prebuilds",
              "url": "https://github.com/${{ github.repository }}.git",
              "deps_file": "DEPS",
              "managed": False,
              "custom_deps": {},
              "custom_vars": {
                "checkout_pgo_profiles": True
              },
            },
          ]
          target_os = ["macos", "ios"]
          target_cpu = ["x64", "arm64"]
          EOF

          gclient sync -D --revision src/prebuilds@${{ github.ref }}

          if [ ! -d "buildtools" ]; then
            ln -s src/buildtools buildtools
          fi

      - name: Patch
        working-directory: chromium
        run: |
          git apply --directory src src/prebuilds/patches/*.patch

      - name: Build darwin-arm64
        working-directory: chromium/src
        run: |
          gn gen out/darwin-arm64/v8 --args="import(\"//prebuilds/v8.gni\") import(\"//prebuilds/mode/release.gni\") import(\"//prebuilds/target/darwin-arm64.gni\")"
          ninja -C out/darwin-arm64/v8 prebuilds

      - name: Build darwin-x64
        working-directory: chromium/src
        run: |
          gn gen out/darwin-x64/v8 --args="import(\"//prebuilds/v8.gni\") import(\"//prebuilds/mode/release.gni\") import(\"//prebuilds/target/darwin-x64.gni\")"
          ninja -C out/darwin-x64/v8 prebuilds

      - name: Build ios-arm64
        working-directory: chromium/src
        run: |
          gn gen out/ios-arm64/v8 --args="import(\"//prebuilds/v8.gni\") import(\"//prebuilds/mode/release.gni\") import(\"//prebuilds/target/ios-arm64.gni\") v8_enable_webassembly = false cppgc_enable_caged_heap = false"
          ninja -C out/ios-arm64/v8 prebuilds

      - name: Build ios-arm64-simulator
        working-directory: chromium/src
        run: |
          gn gen out/ios-arm64-simulator/v8 --args="import(\"//prebuilds/v8.gni\") import(\"//prebuilds/mode/release.gni\") import(\"//prebuilds/target/ios-arm64-simulator.gni\") v8_enable_webassembly = false"
          ninja -C out/ios-arm64-simulator/v8 prebuilds

      - name: Build ios-x64-simulator
        working-directory: chromium/src
        run: |
          gn gen out/ios-x64-simulator/v8 --args="import(\"//prebuilds/v8.gni\") import(\"//prebuilds/mode/release.gni\") import(\"//prebuilds/target/ios-x64-simulator.gni\") v8_enable_webassembly = false"
          ninja -C out/ios-x64-simulator/v8 prebuilds

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: apple
          path: chromium/src/out/*/v8/obj/prebuilds/*.a
          retention-days: 5

      - name: Clean
        if: always()
        working-directory: chromium/src
        run: |
          git checkout .

  windows:
    runs-on: beefcake-win32-x64
    name: windows
    env:
      DEPOT_TOOLS_WIN_TOOLCHAIN: 0
    steps:
      - name: Install
        run: |
          if (-not (Test-Path "depot_tools" -PathType Container)) {
              git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git
          }

          "$env:GITHUB_WORKSPACE\depot_tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

          New-Item -ItemType Directory -Force -Path "chromium" | Out-Null

      - name: Download
        working-directory: chromium
        run: |
          @'
          solutions = [
            { "name": "src/prebuilds",
              "url": "https://github.com/${{ github.repository }}.git",
              "deps_file": "DEPS",
              "managed": False,
              "custom_deps": {},
              "custom_vars": {
                "checkout_pgo_profiles": True
              },
            },
          ]
          target_os = ["win"]
          target_cpu = ["x64", "arm64"]
          '@ | Out-File -FilePath ".gclient" -Encoding utf8

          gclient sync -D --revision "src/prebuilds@${{ github.ref }}"

          if (-not (Test-Path "buildtools" -PathType Container)) {
              New-Item -ItemType Junction -Path "buildtools" -Target "src/buildtools" | Out-Null
          }

      - name: Patch
        working-directory: chromium
        run: |
          Get-ChildItem "src/prebuilds/patches" -Filter "*.patch" | ForEach-Object {
            git apply --directory src $_.FullName
          }

      - name: Build win32-arm64
        working-directory: chromium/src
        run: |
          gn gen out/win32-arm64/v8 --args="import(\`"//prebuilds/v8.gni\`") import(\`"//prebuilds/mode/release.gni\`") import(\`"//prebuilds/target/win32-arm64.gni\`")"
          ninja -C out/win32-arm64/v8 prebuilds

      - name: Build win32-x64
        working-directory: chromium/src
        run: |
          gn gen out/win32-x64/v8 --args="import(\`"//prebuilds/v8.gni\`") import(\`"//prebuilds/mode/release.gni\`") import(\`"//prebuilds/target/win32-x64.gni\`")"
          ninja -C out/win32-x64/v8 prebuilds

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: apple
          path: chromium/src/out/*/v8/obj/prebuilds/*.a
          retention-days: 5

      - name: Clean
        if: always()
        working-directory: chromium/src
        run: |
          git checkout .
